name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the feature you'd like to see.
      placeholder: A clear and concise description of the feature.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this feature needed?
      description: Explain the problem this feature would solve.
      placeholder: This feature would help because...
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Include any mockups, examples, or other context.
      placeholder: Any additional details...